<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RedPlanet mission dashboard with balanced scorecard controls and Mars flight booking." />
    <meta name="theme-color" content="#1b0f0a" />
    <title>RedPlanet Mission Control</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>🚀 RedPlanet</h1>
        <p class="muted">BSC + Interplanetary Booking</p>
        <nav>
          <button class="nav-link active" data-view="scorecard">Balanced Scorecard</button>
          <button class="nav-link" data-view="booking">Flight Booking</button>
        </nav>
      </aside>

      <main class="main-content">
        <section id="scorecard" class="panel">
          <div class="topbar">
            <h2>Balanced Scorecard Dashboard</h2>
            <span class="tag">Live KPI Playground</span>
          </div>

          <div id="kpiGrid" class="kpi-grid"></div>
        </section>

        <section id="booking" class="panel hidden">
          <div class="topbar">
            <h2>RedPlanet Booking Console</h2>
            <span class="tag">Mission Seat Allocation</span>
          </div>

          <div class="booking-grid">
            <article class="card">
              <h3>Select Flight</h3>
              <div id="flightList"></div>
            </article>

            <article class="card">
              <h3>Passenger</h3>
              <div class="form-grid">
                <input id="fname" placeholder="First Name" maxlength="40" />
                <input id="lname" placeholder="Last Name" maxlength="40" />
              </div>
            </article>

            <article class="card">
              <h3>Select Seat</h3>
              <div id="seatMap" class="seat-map"></div>
            </article>

            <article class="card">
              <h3>Boarding Pass</h3>
              <div id="boardingPass" class="boarding-pass muted">Choose flight, name and seat to generate pass.</div>
              <button id="confirmBtn">Confirm Mission Pass</button>
            </article>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
